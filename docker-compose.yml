services:
  neo4j:
    image: neo4j:5.15-enterprise
    container_name: industrial-neo4j
    restart: unless-stopped
    environment:
      NEO4J_ACCEPT_LICENSE_AGREEMENT: eval
      NEO4J_AUTH: neo4j/industrial_graph_password
      NEO4J_PLUGINS: '["graph-data-science","apoc"]'
      NEO4J_apoc_export_file_enabled: 'true'
      NEO4J_apoc_import_file_enabled: 'true'
      NEO4J_apoc_import_file_use_neo4j_config: 'true'
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - industrial-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7474"]
      interval: 5s
      timeout: 3s
      retries: 40

  qdrant:
    image: qdrant/qdrant:latest
    container_name: industrial-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - industrial-net

  # Optional: Redis for caching and session management
  redis:
    image: redis:7-alpine
    container_name: industrial-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - industrial-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 40

  app:
    build: .
    container_name: industrial-app
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=industrial_graph_password
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      - neo4j
      - qdrant
    ports:
      - "8000:8000"
    networks:
      - industrial-net

volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_data:

networks:
  industrial-net:
    driver: bridge

  # Application service (runs the FastAPI app) will also join this network

