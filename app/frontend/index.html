<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Industrial PDF Graph</title>
  <style>
    body { font-family: Inter, system-ui, sans-serif; margin: 0; padding: 0; color: #111; background: #f7fafc; }
    main { max-width: 900px; margin: 40px auto; padding: 24px; background: #fff; border-radius: 16px; box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08); }
    h1 { margin-top: 0; font-size: 1.8rem; }
    label { display: block; margin-bottom: 12px; font-weight: 600; }
    input[type=file] { display: block; margin-bottom: 16px; }
    button { border: none; border-radius: 999px; padding: 12px 20px; background: #2563eb; color: white; cursor: pointer; font-size: 1rem; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    pre { background: #0f172a; color: #f8fafc; padding: 16px; border-radius: 12px; overflow-x: auto; max-height: 420px; }
    .pane { display: grid; gap: 24px; margin-top: 24px; }
    .section { border: 1px solid #e2e8f0; border-radius: 14px; padding: 18px; background: #f8fafc; }
    .section h2 { margin-top: 0; font-size: 1.1rem; }
  </style>
</head>
<body>
<main>
  <h1>Industrial PDF Graph</h1>
  <p>A minimal frontend for uploading a PDF and seeing the pipeline output.</p>

  <form id="uploadForm">
    <label for="pdfFile">Select a PDF file</label>
    <input id="pdfFile" type="file" accept="application/pdf" required />
    <button id="submitBtn" type="submit">Process PDF</button>
  </form>

  <div class="pane">
    <div class="section">
      <h2>Logs</h2>
      <pre id="logs">Ready to upload.</pre>
    </div>
    <div class="section">
      <h2>Output</h2>
      <pre id="output">No output yet.</pre>
    </div>
  </div>
</main>
<script>
const form = document.getElementById('uploadForm');
const fileInput = document.getElementById('pdfFile');
const logs = document.getElementById('logs');
const output = document.getElementById('output');
const submitBtn = document.getElementById('submitBtn');
let pollTimer = null;

function appendLog(message) {
  logs.textContent += '\n' + message;
  logs.scrollTop = logs.scrollHeight;
}

async function pollJob(jobId) {
  if (pollTimer) {
    clearInterval(pollTimer);
    pollTimer = null;
  }

  appendLog(`Tracking job ${jobId}`);
  pollTimer = setInterval(async () => {
    try {
      const response = await fetch(`/api/v1/jobs/${jobId}`);
      const data = await response.json();
      appendLog(`Job status: ${data.status}`);

      if (data.status === 'completed' || data.status === 'failed') {
        clearInterval(pollTimer);
        pollTimer = null;
        output.textContent = JSON.stringify(data, null, 2);
        submitBtn.disabled = false;
      }
    } catch (error) {
      appendLog('Polling failed: ' + error.message);
      clearInterval(pollTimer);
      pollTimer = null;
      submitBtn.disabled = false;
    }
  }, 3000);
}

form.addEventListener('submit', async (event) => {
  event.preventDefault();
  if (!fileInput.files.length) return;
  submitBtn.disabled = true;
  logs.textContent = 'Uploading file...';
  output.textContent = '';

  const file = fileInput.files[0];
  const formData = new FormData();
  formData.append('file', file);

  try {
    appendLog('Sending request to /api/v1/process-pdf');
    const response = await fetch('/api/v1/process-pdf', {
      method: 'POST',
      body: formData,
    });
    appendLog(`Response status: ${response.status}`);
    const data = await response.json();

    appendLog(`Received job ${data.job_id} with status ${data.status}.`);
    output.textContent = JSON.stringify(data, null, 2);

    if (data.status === 'completed' || data.status === 'failed') {
      submitBtn.disabled = false;
      return;
    }

    if (data.job_id) {
      await pollJob(data.job_id);
    } else {
      submitBtn.disabled = false;
    }
  } catch (error) {
    appendLog('Request failed: ' + error.message);
    output.textContent = error.stack || String(error);
    submitBtn.disabled = false;
  } finally {
    if (!pollTimer && submitBtn.disabled) {
      submitBtn.disabled = false;
    }
  }
});
</script>
</body>
</html>
